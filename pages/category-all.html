<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智享书途 - 全部分类</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-[#F3F4F6] min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 h-[60px] bg-white shadow-sm z-10 flex items-center justify-between px-[16px]">
        <div class="flex items-center gap-[8px]">
            <button class="back-btn">
                <i class="fa fa-arrow-left text-[20px]"></i>
            </button>
            <h1 class="text-[18px] font-medium">全部分类</h1>
        </div>
        <button class="text-[#4B5563]">
            <i class="fa fa-search text-[20px]"></i>
        </button>
    </header>

    <!-- 主内容区 -->
    <main class="pt-[60px] pb-[60px] container mx-auto px-[16px]">
        <!-- 分类列表 -->
        <div class="space-y-[16px] mt-[16px]">
            <!-- 分类项1 -->
            <div class="card">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[40px] h-[40px] bg-[#EFF6FF] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-book text-[#2563EB]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">教材课本</h3>
                            <p class="text-[12px] text-[#9CA3AF]">包含各专业核心教材</p>
                        </div>
                    </div>
                    <i class="fa fa-chevron-right text-[#9CA3AF]"></i>
                </div>
            </div>
            
            <!-- 分类项2 -->
            <div class="card">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[40px] h-[40px] bg-[#FEF3C7] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-file-alt text-[#F59E0B]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">复习资料</h3>
                            <p class="text-[12px] text-[#9CA3AF]">包含各学科复习资料</p>
                        </div>
                    </div>
                    <i class="fa fa-chevron-right text-[#9CA3AF]"></i>
                </div>
            </div>
            
            <!-- 分类项3 -->
            <div class="card">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[40px] h-[40px] bg-[#D1FAE5] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-file-signature text-[#10B981]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">历年真题</h3>
                            <p class="text-[12px] text-[#9CA3AF]">包含各类考试历年真题</p>
                        </div>
                    </div>
                    <i class="fa fa-chevron-right text-[#9CA3AF]"></i>
                </div>
            </div>
            
            <!-- 分类项4 -->
            <div class="card">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[40px] h-[40px] bg-[#FEE2E2] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-clipboard-list text-[#EF4444]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">笔记总结</h3>
                            <p class="text-[12px] text-[#9CA3AF]">包含优秀学生笔记</p>
                        </div>
                    </div>
                    <i class="fa fa-chevron-right text-[#9CA3AF]"></i>
                </div>
            </div>
            
            <!-- 分类项5 -->
            <div class="card">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[40px] h-[40px] bg-[#E0E7FF] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-file-powerpoint text-[#5B21B6]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">课件PPT</h3>
                            <p class="text-[12px] text-[#9CA3AF]">包含各课程课件PPT</p>
                        </div>
                    </div>
                    <i class="fa fa-chevron-right text-[#9CA3AF]"></i>
                </div>
            </div>
            
            <!-- 分类项6 -->
            <div class="card">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[40px] h-[40px] bg-[#F3E8FF] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-flask text-[#8B5CF6]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">实验报告</h3>
                            <p class="text-[12px] text-[#9CA3AF]">包含各学科实验报告</p>
                        </div>
                    </div>
                    <i class="fa fa-chevron-right text-[#9CA3AF]"></i>
                </div>
            </div>
            
            <!-- 分类项7 -->
            <div class="card">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[40px] h-[40px] bg-[#FCD34D] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-code text-[#92400E]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">编程资料</h3>
                            <p class="text-[12px] text-[#9CA3AF]">包含各类编程学习资料</p>
                        </div>
                    </div>
                    <i class="fa fa-chevron-right text-[#9CA3AF]"></i>
                </div>
            </div>
            
            <!-- 分类项8 -->
            <div class="card">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[40px] h-[40px] bg-[#FEE2E2] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-tasks text-[#DC2626]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">考研资料</h3>
                            <p class="text-[12px] text-[#9CA3AF]">包含各类考研复习资料</p>
                        </div>
                    </div>
                    <i class="fa fa-chevron-right text-[#9CA3AF]"></i>
                </div>
            </div>
        </div>
    </main>
<!-- 全局JavaScript -->
    <script src="../assets/js/app.js"></script>
</body>
</html>
