<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智享书途 - 考前应急专区</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-[#F3F4F6] min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 h-[60px] bg-white shadow-sm z-10 flex items-center justify-between px-[16px]">
        <div class="flex items-center gap-[8px]">
            <button class="back-btn">
                <i class="fa fa-arrow-left text-[20px]"></i>
            </button>
            <h1 class="text-[18px] font-medium">考前应急专区</h1>
        </div>
        <button class="text-[#4B5563]">
            <i class="fa fa-search text-[20px]"></i>
        </button>
    </header>

    <!-- 主内容区 -->
    <main class="pt-[60px] pb-[60px] container mx-auto px-[16px]">
        <!-- 专区介绍 -->
        <div class="card mt-[16px]">
            <div class="flex items-center gap-[12px]">
                <div class="w-[60px] h-[60px] bg-[#FEE2E2] rounded-[8px] flex items-center justify-center">
                    <i class="fa fa-clock text-[#EF4444] text-[32px]"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-[16px] font-medium mb-[4px]">期末考试突击包</h2>
                    <p class="text-[12px] text-[#4B5563]">包含各专业重点知识点、历年考试真题，助你快速复习</p>
                </div>
            </div>
        </div>
        
        <!-- 考试倒计时 -->
        <div class="card mt-[16px]">
            <h3 class="text-[16px] font-medium mb-[12px]">考试倒计时</h3>
            <div class="grid grid-cols-3 gap-[16px]">
                <!-- 倒计时项1 -->
                <div class="text-center">
                    <div class="w-full h-[60px] bg-[#F3F4F6] rounded-[8px] flex items-center justify-center">
                        <span class="text-[24px] font-bold">3</span>
                    </div>
                    <div class="text-[12px] text-[#9CA3AF] mt-[4px]">天</div>
                </div>
                <!-- 倒计时项2 -->
                <div class="text-center">
                    <div class="w-full h-[60px] bg-[#F3F4F6] rounded-[8px] flex items-center justify-center">
                        <span class="text-[24px] font-bold">12</span>
                    </div>
                    <div class="text-[12px] text-[#9CA3AF] mt-[4px]">时</div>
                </div>
                <!-- 倒计时项3 -->
                <div class="text-center">
                    <div class="w-full h-[60px] bg-[#F3F4F6] rounded-[8px] flex items-center justify-center">
                        <span class="text-[24px] font-bold">45</span>
                    </div>
                    <div class="text-[12px] text-[#9CA3AF] mt-[4px]">分</div>
                </div>
            </div>
        </div>
        
        <!-- 专业分类 -->
        <div class="mt-[24px]">
            <h3 class="text-[18px] font-medium mb-[12px]">选择你的专业</h3>
            <div class="grid grid-cols-2 gap-[12px]">
                <button class="card">
                    <div class="w-full h-[40px] bg-[#EFF6FF] rounded-[8px] flex items-center justify-center mb-[8px]">
                        <i class="fa fa-laptop-code text-[#2563EB] text-[24px]"></i>
                    </div>
                    <h4 class="text-center text-[14px] font-medium">计算机科学</h4>
                </button>
                <button class="card">
                    <div class="w-full h-[40px] bg-[#FEF3C7] rounded-[8px] flex items-center justify-center mb-[8px]">
                        <i class="fa fa-microchip text-[#F59E0B] text-[24px]"></i>
                    </div>
                    <h4 class="text-center text-[14px] font-medium">电子工程</h4>
                </button>
                <button class="card">
                    <div class="w-full h-[40px] bg-[#D1FAE5] rounded-[8px] flex items-center justify-center mb-[8px]">
                        <i class="fa fa-calculator text-[#10B981] text-[24px]"></i>
                    </div>
                    <h4 class="text-center text-[14px] font-medium">数学与统计</h4>
                </button>
                <button class="card">
                    <div class="w-full h-[40px] bg-[#FEE2E2] rounded-[8px] flex items-center justify-center mb-[8px]">
                        <i class="fa fa-heartbeat text-[#EF4444] text-[24px]"></i>
                    </div>
                    <h4 class="text-center text-[14px] font-medium">医学</h4>
                </button>
                <button class="card">
                    <div class="w-full h-[40px] bg-[#E0E7FF] rounded-[8px] flex items-center justify-center mb-[8px]">
                        <i class="fa fa-building text-[#5B21B6] text-[24px]"></i>
                    </div>
                    <h4 class="text-center text-[14px] font-medium">管理学</h4>
                </button>
                <button class="card">
                    <div class="w-full h-[40px] bg-[#F3E8FF] rounded-[8px] flex items-center justify-center mb-[8px]">
                        <i class="fa fa-book-open text-[#8B5CF6] text-[24px]"></i>
                    </div>
                    <h4 class="text-center text-[14px] font-medium">文学</h4>
                </button>
            </div>
        </div>
        
        <!-- 热门冲刺资料 -->
        <div class="mt-[24px]">
            <h3 class="text-[18px] font-medium mb-[12px]">热门冲刺资料</h3>
            <div class="space-y-[16px]">
                <!-- 资料卡片1 -->
                <div class="card">
                    <div class="flex gap-[12px]">
                        <div class="w-[80px] h-[80px] bg-[#F3F4F6] rounded-[8px]"></div>
                        <div class="flex-1">
                            <h4 class="text-[16px] font-medium mb-[4px]">高等数学重点公式汇总</h4>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">发布于 2023-11-20</p>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-[4px]">
                                    <i class="fa fa-coins text-[#F97316]"></i>
                                    <span class="text-[12px] text-[#4B5563]">49积分</span>
                                </div>
                                <button class="exchange-btn" data-points="49">立即兑换</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 资料卡片2 -->
                <div class="card">
                    <div class="flex gap-[12px]">
                        <div class="w-[80px] h-[80px] bg-[#F3F4F6] rounded-[8px]"></div>
                        <div class="flex-1">
                            <h4 class="text-[16px] font-medium mb-[4px]">大学物理实验考试重点</h4>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">发布于 2023-11-18</p>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-[4px]">
                                    <i class="fa fa-coins text-[#F97316]"></i>
                                    <span class="text-[12px] text-[#4B5563]">69积分</span>
                                </div>
                                <button class="exchange-btn" data-points="69">立即兑换</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 资料卡片3 -->
                <div class="card">
                    <div class="flex gap-[12px]">
                        <div class="w-[80px] h-[80px] bg-[#F3F4F6] rounded-[8px]"></div>
                        <div class="flex-1">
                            <h4 class="text-[16px] font-medium mb-[4px]">数据结构考试真题解析</h4>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">发布于 2023-11-15</p>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-[4px]">
                                    <i class="fa fa-coins text-[#F97316]"></i>
                                    <span class="text-[12px] text-[#4B5563]">99积分</span>
                                </div>
                                <button class="exchange-btn" data-points="99">立即兑换</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 备考攻略 -->
        <div class="mt-[24px]">
            <h3 class="text-[18px] font-medium mb-[12px]">备考攻略</h3>
            <div class="card">
                <div class="flex gap-[12px]">
                    <div class="w-[80px] h-[80px] bg-[#D1FAE5] rounded-[8px] flex items-center justify-center">
                        <i class="fa fa-lightbulb text-[#10B981] text-[32px]"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="text-[16px] font-medium mb-[4px]">如何高效复习期末考试</h4>
                        <p class="text-[12px] text-[#9CA3AF] mb-[8px]">作者：张三 | 发布于 2023-11-20</p>
                        <div class="flex items-center gap-[16px]">
                            <div class="flex items-center gap-[4px]">
                                <i class="fa fa-eye text-[#9CA3AF]"></i>
                                <span class="text-[12px] text-[#9CA3AF]">2345次</span>
                            </div>
                            <div class="flex items-center gap-[4px]">
                                <i class="fa fa-heart text-[#EF4444]"></i>
                                <span class="text-[12px] text-[#9CA3AF]">156次</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部Tab栏 -->
    <footer>
        <div class="tabbar">
            <!-- 首页 -->
            <div class="tabbar-item inactive" data-page="home">
                <i class="fa fa-home text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">首页</span>
            </div>
            
            <!-- 找资料 -->
            <div class="tabbar-item inactive" data-page="search">
                <i class="fa fa-search text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">找资料</span>
            </div>
            
            <!-- 互助 -->
            <div class="tabbar-item inactive" data-page="exchange">
                <i class="fa fa-exchange-alt text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">互助</span>
            </div>
            
            <!-- 备考 -->
            <div class="tabbar-item active" data-page="exam">
                <i class="fa fa-pen-fancy text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">备考</span>
            </div>
            
            <!-- 我的 -->
            <div class="tabbar-item inactive" data-page="profile">
                <i class="fa fa-user text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">我的</span>
            </div>
        </div>
    </footer>

    <!-- 全局JavaScript -->
    <script src="../assets/js/app.js"></script>
</body>
</html>
