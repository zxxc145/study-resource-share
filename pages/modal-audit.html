<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智享书途 - 审核结果提示</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <div class="modal-overlay">
        <div class="modal-container p-[24px]">
            <div class="text-center">
                <div class="w-[80px] h-[80px] bg-[#D1FAE5] rounded-full flex items-center justify-center mx-auto mb-[16px]">
                    <i class="fa fa-check-circle text-[#10B981] text-[40px]"></i>
                </div>
                <h3 class="text-[18px] font-medium mb-[8px]">认证审核通过</h3>
                <p class="text-[14px] text-[#4B5563] mb-[24px]">恭喜您已成功通过校园认证，现在可以享受全部功能</p>
                <button class="btn-primary modal-close">确定</button>
            </div>
        </div>
    </div>

    <!-- 全局JavaScript -->
    <script src="../assets/js/app.js"></script>
</body>
</html>
