<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智享书途 - 新人福利</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-[#F3F4F6] min-h-screen flex flex-col items-center justify-center px-[16px]">
    <!-- 福利标题 -->
    <div class="text-center mb-[32px]">
        <div class="w-[120px] h-[120px] bg-[#FEF3C7] rounded-full flex items-center justify-center mx-auto mb-[16px]">
            <i class="fa fa-gift text-[#F59E0B] text-[60px]"></i>
        </div>
        <h2 class="text-[24px] font-bold mb-[8px]">新人专属福利</h2>
        <p class="text-[16px] text-[#4B5563]">完成注册即可获得丰厚奖励</p>
    </div>
    
    <!-- 福利列表 -->
    <div class="w-full max-w-[343px] space-y-[12px] mb-[32px]">
        <!-- 福利项1 -->
        <div class="flex items-center gap-[12px] p-[16px] bg-white rounded-[12px]">
            <div class="w-[40px] h-[40px] bg-[#D1FAE5] rounded-full flex items-center justify-center">
                <i class="fa fa-coins text-[#10B981]"></i>
            </div>
            <div class="flex-1">
                <h3 class="text-[16px] font-medium">500积分奖励</h3>
                <p class="text-[12px] text-[#9CA3AF]">注册即送500积分，可兑换优质学习资料</p>
            </div>
            <span class="text-[#10B981] text-[12px]">已领取</span>
        </div>
        
        <!-- 福利项2 -->
        <div class="flex items-center gap-[12px] p-[16px] bg-white rounded-[12px]">
            <div class="w-[40px] h-[40px] bg-[#EFF6FF] rounded-full flex items-center justify-center">
                <i class="fa fa-star text-[#2563EB]"></i>
            </div>
            <div class="flex-1">
                <h3 class="text-[16px] font-medium">新人专属折扣</h3>
                <p class="text-[12px] text-[#9CA3AF]">首次兑换资料享受8折优惠</p>
            </div>
            <span class="text-[#10B981] text-[12px]">已领取</span>
        </div>
        
        <!-- 福利项3 -->
        <div class="flex items-center gap-[12px] p-[16px] bg-white rounded-[12px]">
            <div class="w-[40px] h-[40px] bg-[#FEE2E2] rounded-full flex items-center justify-center">
                <i class="fa fa-book text-[#EF4444]"></i>
            </div>
            <div class="flex-1">
                <h3 class="text-[16px] font-medium">免费资料任选</h3>
                <p class="text-[12px] text-[#9CA3AF]">可免费选择1本优质学习资料</p>
            </div>
            <span class="text-[#10B981] text-[12px]">已领取</span>
        </div>
    </div>
    
    <!-- 立即开始按钮 -->
    <button class="btn-primary" onclick="window.location.href='home.html'">
        立即开始使用
    </button>
<!-- 全局JavaScript -->
    <script src="../assets/js/app.js"></script>
</body>
</html>
