<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智享书途 - 交换请求处理</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-[#F3F4F6] min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 h-[60px] bg-white shadow-sm z-10 flex items-center justify-between px-[16px]">
        <div class="flex items-center gap-[8px]">
            <button class="back-btn">
                <i class="fa fa-arrow-left text-[20px]"></i>
            </button>
            <h1 class="text-[18px] font-medium">交换请求管理</h1>
        </div>
        <button class="text-[#4B5563]">
            <i class="fa fa-filter text-[20px]"></i>
        </button>
    </header>

    <!-- 主内容区 -->
    <main class="pt-[60px] pb-[60px] container mx-auto px-[16px]">
        <!-- Tab切换 -->
        <div class="flex border-b border-[#E5E7EB] mt-[16px]">
            <button class="flex-1 py-[12px] text-center text-[16px] font-medium text-[#2563EB] border-b-2 border-[#2563EB]">收到的请求</button>
            <button class="flex-1 py-[12px] text-center text-[16px] font-medium text-[#9CA3AF]">发出的请求</button>
        </div>
        
        <!-- 收到的请求列表 -->
        <div class="space-y-[16px] mt-[16px]">
            <!-- 请求项1 -->
            <div class="card">
                <div class="flex items-center justify-between mb-[12px]">
                    <span class="text-[12px] px-[6px] py-[2px] bg-[#FEF3C7] text-[#F59E0B] rounded-full">待处理</span>
                    <span class="text-[12px] text-[#9CA3AF]">2023-11-20 15:30</span>
                </div>
                
                <div class="flex gap-[12px]">
                    <div class="w-[60px] h-[60px] bg-[#F3F4F6] rounded-[8px]"></div>
                    <div class="flex-1">
                        <h3 class="text-[16px] font-medium mb-[4px]">计算机网络教材</h3>
                        <p class="text-[12px] text-[#9CA3AF] mb-[8px]">来自：李四</p>
                        <div class="text-[12px] text-[#4B5563] mb-[12px]">
                            <span class="font-medium">交换请求：</span>
                            用高等数学下册交换计算机网络教材
                        </div>
                        <div class="flex items-center gap-[8px]">
                            <button class="flex-1 py-[8px] bg-[#D1FAE5] text-[#10B981] text-[14px] font-medium rounded-[8px]">接受</button>
                            <button class="flex-1 py-[8px] bg-[#FEE2E2] text-[#EF4444] text-[14px] font-medium rounded-[8px]">拒绝</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 请求项2 -->
            <div class="card">
                <div class="flex items-center justify-between mb-[12px]">
                    <span class="text-[12px] px-[6px] py-[2px] bg-[#D1FAE5] text-[#10B981] rounded-full">已接受</span>
                    <span class="text-[12px] text-[#9CA3AF]">2023-11-18 10:20</span>
                </div>
                
                <div class="flex gap-[12px]">
                    <div class="w-[60px] h-[60px] bg-[#F3F4F6] rounded-[8px]"></div>
                    <div class="flex-1">
                        <h3 class="text-[16px] font-medium mb-[4px]">大学英语四级词汇</h3>
                        <p class="text-[12px] text-[#9CA3AF] mb-[8px]">来自：王五</p>
                        <div class="text-[12px] text-[#4B5563] mb-[12px]">
                            <span class="font-medium">交换请求：</span>
                            用大学语文交换大学英语四级词汇
                        </div>
                        <button class="w-full py-[8px] bg-[#EFF6FF] text-[#2563EB] text-[14px] font-medium rounded-[8px]">查看详情</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 空状态（当没有请求时显示） -->
        <div class="hidden flex flex-col items-center justify-center pt-[80px]">
            <div class="w-[120px] h-[120px] bg-[#F3F4F6] rounded-full flex items-center justify-center mb-[16px]">
                <i class="fa fa-exchange-alt text-[#9CA3AF] text-[60px]"></i>
            </div>
            <h3 class="text-[16px] font-medium mb-[8px]">暂无交换请求</h3>
            <p class="text-[14px] text-[#9CA3AF] mb-[24px]">快去发起或等待他人的交换请求吧</p>
            <button class="btn-primary" onclick="window.location.href='exchange.html'">
                去发起交换
            </button>
        </div>
    </main>

    <!-- 底部Tab栏 -->
    <footer>
        <div class="tabbar">
            <!-- 首页 -->
            <div class="tabbar-item inactive" data-page="home">
                <i class="fa fa-home text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">首页</span>
            </div>
            
            <!-- 找资料 -->
            <div class="tabbar-item inactive" data-page="search">
                <i class="fa fa-search text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">找资料</span>
            </div>
            
            <!-- 互助 -->
            <div class="tabbar-item active" data-page="exchange">
                <i class="fa fa-exchange-alt text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">互助</span>
            </div>
            
            <!-- 备考 -->
            <div class="tabbar-item inactive" data-page="exam">
                <i class="fa fa-pen-fancy text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">备考</span>
            </div>
            
            <!-- 我的 -->
            <div class="tabbar-item inactive" data-page="profile">
                <i class="fa fa-user text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">我的</span>
            </div>
        </div>
    </footer>

    <!-- 全局JavaScript -->
    <script src="../assets/js/app.js"></script>
</body>
</html>
