<!-- 主要按钮 -->
<button class="btn-primary">
  {{buttonText}}
</button>

<!-- 次要按钮 -->
<button class="btn-secondary">
  {{buttonText}}
</button>

<!-- 带图标按钮 -->
<button class="btn-primary flex items-center justify-center gap-2">
  <i class="fa {{iconClass}}"></i>
  {{buttonText}}
</button>

<!-- 小按钮 -->
<button class="w-full max-w-[200px] h-[36px] rounded-[6px] bg-[#2563EB] text-white font-medium hover:shadow-sm transition-all duration-200">
  {{buttonText}}
</button>
