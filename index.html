<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>智享书途 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="bg-[#F3F4F6] min-h-screen flex items-center justify-center">

<div class="bg-white rounded-[16px] shadow-md p-[24px] w-full max-w-[360px]">
    <form id="loginForm">
        <div class="flex justify-center mb-[24px]">
            <div class="w-[80px] h-[80px] bg-[#EFF6FF] rounded-full flex items-center justify-center">
                <i class="fa fa-book text-[#2563EB] text-[40px]"></i>
            </div>
        </div>

        <h1 class="text-[24px] font-bold text-center text-[#1F2937] mb-[24px]">智享书途</h1>

        <div class="mb-[16px]">
            <label for="username" class="block text-[14px] font-medium text-[#374151] mb-[8px]">用户名</label>
            <div class="relative">
                <i class="fa fa-user absolute left-[16px] top-1/2 -translate-y-1/2 text-[#9CA3AF]"></i>
                <input type="text" id="username" placeholder="请输入用户名" class="input pl-[44px]">
            </div>
        </div>

        <div class="mb-[24px]">
            <label for="password" class="block text-[14px] font-medium text-[#374151] mb-[8px]">密码</label>
            <div class="relative">
                <i class="fa fa-lock absolute left-[16px] top-1/2 -translate-y-1/2 text-[#9CA3AF]"></i>
                <input type="password" id="password" placeholder="请输入密码" class="input pl-[44px]">
            </div>
        </div>

        <button type="submit" class="btn-primary w-full">登录</button>

        <div class="flex justify-center mt-[16px]">
            <span class="text-[14px] text-[#4B5563]">还没有账号？</span>
            <a href="javascript:void(0)" class="text-[14px] text-[#2563EB] ml-[8px]">立即注册</a>
        </div>
    </form>
</div>

<script>
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', function (e) {
        e.preventDefault();
        // 核心：不管填什么，直接跳转
        window.location.href = './preview.html';
    });
</script>

</body>
</html>
